<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ book.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/detail.css') }}">
</head>
<body>
    <h1>{{ book.title }}</h1>
    <img src="{{ cover_url }}" alt="Cover for {{ book.title }}" width="140">
    <p>ISBN: {{ book.isbn }}</p>
    <p>Published: {{ book.date_published if book.date_published else 'Unknown' }}</p>
    <p>Rating: {{ book.rating if book.rating else 'Not rated' }}</p>
    <p>
        Author:
        {% if book.author %}
            <a href="{{ url_for('author_detail', author_id=book.author.id) }}">{{ book.author.name }}</a>
        {% else %}
            Unknown author
        {% endif %}
    </p>
    <a href="{{ url_for('edit_book', book_id=book.id) }}">Edit book</a>
    <form method="post" action="{{ url_for('delete_book', book_id=book.id) }}">
        <button type="submit">Buch löschen</button>
    </form>
    <a href="{{ url_for('home') }}">Back to library</a>
</body>
</html>
