<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Edit Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_book.css') }}">
</head>
<body>
    <h1>Edit Book</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('edit_book', book_id=book.id) }}">
        <label for="isbn">ISBN</label>
        <input type="text" id="isbn" name="isbn" value="{{ book.isbn }}" maxlength="13" required>

        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ book.title }}" required>

        <label for="date_published">Date published</label>
        <input
            type="date"
            id="date_published"
            name="date_published"
            value="{{ book.date_published.isoformat() if book.date_published else '' }}"
        >

        <label for="rating">Rating</label>
        <input type="number" id="rating" name="rating" value="{{ book.rating if book.rating else '' }}" min="1" max="10">

        <label for="author_id">Author</label>
        <select id="author_id" name="author_id" required>
            {% for author in authors %}
                <option value="{{ author.id }}" {% if author.id == book.author_id %}selected{% endif %}>
                    {{ author.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Save changes</button>
    </form>

    <form method="post" action="{{ url_for('delete_book', book_id=book.id) }}">
        <button type="submit">Buch löschen</button>
    </form>

    <a href="{{ url_for('home') }}">Back to library</a>
</body>
</html>
